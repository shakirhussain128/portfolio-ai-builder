kind = "web"
previewPath = "/"
title = "PortFolioGen AI"
version = "1.0.0"
id = "artifacts/portfolio-ai-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26198

[services.development]
run = "pnpm --filter @workspace/portfolio-ai-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-ai-builder", "run", "build" ]
publicDir = "artifacts/portfolio-ai-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26198"
BASE_PATH = "/"
